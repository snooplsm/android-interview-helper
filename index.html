<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>Android Jetpack Compose Interview Guide</title>
  <script>(function(){ document.documentElement.dataset.theme = localStorage.getItem('guide-theme') || 'light'; })();</script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css">
  <style>
    .hero {
      max-width: 680px;
      margin: 90px auto 0;
      padding: 48px 24px 60px;
      text-align: center;
    }
    .hero h1 { font-size: 2.6rem; color: var(--primary); margin-bottom: 10px; font-weight: 800; }
    .hero p  { font-size: 1rem; color: var(--on-surface-variant); margin-bottom: 32px; }

    /* Big search bar */
    .hero-search-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .hero-search-wrap svg {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--on-surface-variant);
      pointer-events: none;
    }
    .hero-search {
      width: 100%;
      padding: 16px 18px 16px 50px;
      font-size: 1.1rem;
      border: 2px solid var(--outline);
      border-radius: 28px;
      background: var(--surface);
      color: var(--on-surface);
      font-family: inherit;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .hero-search:focus {
      border-color: var(--primary);
      box-shadow: 0 4px 20px rgba(103,80,164,.15);
    }
    .hero-search::placeholder { color: var(--on-surface-variant); }

    /* Global search results */
    .hero-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--outline);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
      max-height: 60vh;
      overflow-y: auto;
      z-index: 300;
      text-align: left;
      display: none;
    }
    .hero-results.open { display: block; }
    .hero-result {
      padding: 12px 16px;
      border-bottom: 1px solid var(--outline-variant);
      cursor: pointer;
      transition: background var(--transition);
    }
    .hero-result:last-child { border-bottom: none; }
    .hero-result:hover { background: var(--surface-variant); }
    .hr-section { font-size: .7rem; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--primary); }
    .hr-title   { font-size: .92rem; font-weight: 600; color: var(--on-surface); }
    .hr-snippet { font-size: .8rem; color: var(--on-surface-variant); margin-top: 2px; }
    .hr-snippet mark { background: var(--primary-container); color: var(--on-primary-container); border-radius: 2px; padding: 0 2px; }
    .search-empty { padding: 24px; text-align: center; color: var(--on-surface-variant); }

  </style>
</head>
<body>
<div id="nav-container"></div>

<div class="hero">
  <h1>Android Compose<br>Interview Guide</h1>
  <p>Jetpack Compose, coroutines, DI, storage, Gradle, and design patterns — all in one place.</p>

  <div class="hero-search-wrap">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input
      class="hero-search"
      id="heroSearch"
      type="search"
      placeholder="Search topics, e.g. LaunchedEffect, Hilt, stateIn…"
      autocomplete="off"
    >
    <div class="hero-results" id="heroResults"></div>
  </div>
</div>

<footer>

</footer>

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function highlightMatch(text, q) {
  const re = new RegExp(`(${escHtml(q)})`, 'gi');
  return escHtml(text).replace(re, '<mark>$1</mark>');
}

const heroSearch = document.getElementById('heroSearch');
const heroResults = document.getElementById('heroResults');

heroSearch.addEventListener('input', () => {
  const q = heroSearch.value.trim().toLowerCase();
  if (q.length < 2) { heroResults.classList.remove('open'); return; }

  const matches = SEARCH_INDEX.filter(item =>
    item.title.toLowerCase().includes(q) ||
    item.desc.toLowerCase().includes(q) ||
    item.section.toLowerCase().includes(q)
  ).slice(0, 20);

  if (!matches.length) {
    heroResults.innerHTML = `<div class="search-empty">No results for "<strong>${escHtml(q)}</strong>"</div>`;
  } else {
    heroResults.innerHTML = matches.map(r => `
      <div class="hero-result" onclick="window.location='${r.url}'">
        <div class="hr-section">${escHtml(r.section)}</div>
        <div class="hr-title">${highlightMatch(r.title, q)}</div>
        <div class="hr-snippet">${highlightMatch(r.desc.slice(0, 100), q)}</div>
      </div>
    `).join('');
  }
  heroResults.classList.add('open');
});

document.addEventListener('click', e => {
  if (!e.target.closest('.hero-search-wrap')) heroResults.classList.remove('open');
});

heroSearch.addEventListener('keydown', e => {
  if (e.key === 'Escape') { heroResults.classList.remove('open'); heroSearch.blur(); }
  if (e.key === 'Enter') {
    const first = heroResults.querySelector('.hero-result');
    if (first) first.click();
  }
});
